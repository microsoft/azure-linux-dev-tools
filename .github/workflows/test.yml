name: "Run tests"
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:
  schedule:
    # Run every night at 3:15am PST (11:15am UTC)
    - cron: "15 11 * * *"

# Cancel in-progress runs of this workflow if a new run is triggered.
concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.run_id }}
  cancel-in-progress: true

permissions: {}

jobs:
  unit-tests:
    name: "Unit tests"
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
      - name: Get go tools
        uses: ./.github/getgotools
      - name: Run tests
        run: |
          mage -v unit

  scenario-tests:
    name: "Scenario tests"
    strategy:
      matrix:
        host: [ubuntu-latest]
    runs-on: ${{ matrix.host }}
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
      - name: Get go tools
        uses: ./.github/getgotools

      - name: Disable unix_chkpwd policy
        run: |
          # We disable the unix-chkpwd AppArmor profile to avoid errors running
          # containerized tests. We also need to purge a few packages to avoid
          # profile conflicts.
          set -euxo pipefail
          sudo apt-get update
          sudo apt-get purge firefox passt
          # Microsoft Edge (preinstalled on the runner image) ships two AppArmor
          # profiles attached to the same binary (/etc/apparmor.d/msedge and
          # /etc/apparmor.d/microsoft-edge-stable). That duplicate attachment makes
          # aa-disable abort while parsing all profiles, so remove them first.
          sudo rm -f /etc/apparmor.d/msedge /etc/apparmor.d/microsoft-edge-stable
          sudo systemctl reload apparmor.service
          sudo apt-get install apparmor-utils
          sudo aa-disable /usr/sbin/unix_chkpwd

      - name: Run tests
        run: |
          mage -v scenario

  e2e-tests:
    name: "End-to-end tests"
    # E2E tests are tagged separately from scenario tests (build tag 'e2e' vs.
    # 'scenario') so they do not run as part of 'mage scenario' / 'mage all'.
    # They clone large upstream repositories and exercise full mock pipelines,
    # so they live in their own job and are gated on network access.
    strategy:
      matrix:
        host: [ubuntu-latest]
    runs-on: ${{ matrix.host }}
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
      - name: Get go tools
        uses: ./.github/getgotools

      - name: Disable unix_chkpwd policy
        run: |
          # We disable the unix-chkpwd AppArmor profile to avoid errors running
          # containerized tests. We also need to purge a few packages to avoid
          # profile conflicts.
          set -euxo pipefail
          sudo apt-get update
          sudo apt-get purge firefox passt
          # Microsoft Edge (preinstalled on the runner image) ships two AppArmor
          # profiles attached to the same binary (/etc/apparmor.d/msedge and
          # /etc/apparmor.d/microsoft-edge-stable). That duplicate attachment makes
          # aa-disable abort while parsing all profiles, so remove them first.
          sudo rm -f /etc/apparmor.d/msedge /etc/apparmor.d/microsoft-edge-stable
          sudo systemctl reload apparmor.service
          sudo apt-get install apparmor-utils
          sudo aa-disable /usr/sbin/unix_chkpwd

      - name: Run tests
        run: |
          mage -v e2e
